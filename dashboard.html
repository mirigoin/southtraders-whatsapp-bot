<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>South Traders Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a1a}
header{background:#1a1a2e;color:white;padding:14px 24px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
header h1{font-size:18px;font-weight:600}
.dot{width:9px;height:9px;border-radius:50%;background:#22c55e;flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.ts{font-size:12px;color:#aaa;margin-left:auto}
.wrap{max-width:1000px;margin:0 auto;padding:20px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.stat{background:white;border-radius:10px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.stat .n{font-size:30px;font-weight:700;color:#1a1a2e}
.stat .l{font-size:12px;color:#777;margin-top:3px}
.sendbox{background:white;border-radius:10px;padding:18px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.sendbox h2{font-size:14px;font-weight:600;margin-bottom:10px;color:#1a1a2e}
.row{display:flex;gap:8px;flex-wrap:wrap}
.row input{flex:1;min-width:130px;border:1px solid #ddd;border-radius:7px;padding:9px 12px;font-size:13px}
.row input:focus{outline:none;border-color:#1a1a2e}
.btn{padding:9px 16px;border:none;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer}
.btn-blue{background:#1a1a2e;color:white}
.btn-blue:hover{background:#2d2d4e}
.btn-red{background:#ef4444;color:white;font-size:11px;padding:5px 10px}
.btn-red:hover{background:#dc2626}
.btn-orange{background:#f59e0b;color:white;font-size:11px;padding:5px 10px}
.btn-orange:hover{background:#d97706}
.btn-green{background:#22c55e;color:white;font-size:11px;padding:5px 10px}
.btn-green:hover{background:#16a34a}
.contacts{display:flex;flex-direction:column;gap:14px}
.card{background:white;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden}
.card-head{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;border-bottom:1px solid #f0f0f0}
.card-head:hover{background:#fafafa}
.avatar{width:38px;height:38px;border-radius:50%;background:#1a1a2e;color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.info{flex:1}
.phone{font-weight:600;font-size:14px}
.meta{font-size:11px;color:#888;margin-top:2px}
.actions{display:flex;gap:6px;align-items:center}
.badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.badge-on{background:#dcfce7;color:#166534}
.badge-off{background:#fef3c7;color:#92400e}
.chev{font-size:11px;color:#bbb;transition:transform .2s}
.chev.open{transform:rotate(180deg)}
.msgs{display:none;flex-direction:column;gap:6px;padding:14px 18px;background:#f9fafb;max-height:380px;overflow-y:auto}
.msgs.open{display:flex}
.mwrap{display:flex;flex-direction:column}
.mwrap.assistant{align-items:flex-end}
.msg{max-width:72%;padding:9px 13px;border-radius:10px;font-size:13px;line-height:1.5}
.msg.user{background:#e8f0fe;color:#1a1a1a;border-bottom-left-radius:3px}
.msg.assistant{background:#1a1a2e;color:white;border-bottom-right-radius:3px}
.mtime{font-size:10px;opacity:.5;margin-top:2px}
.reply{padding:10px 18px;border-top:1px solid #eee;display:none;gap:8px}
.reply.open{display:flex}
.reply input{flex:1;border:1px solid #ddd;border-radius:7px;padding:9px 12px;font-size:13px}
.reply input:focus{outline:none;border-color:#1a1a2e}
.empty{text-align:center;padding:50px;color:#bbb}
.toast{position:fixed;bottom:20px;right:20px;background:#1a1a2e;color:white;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
</style>
</head>
<body>
<header>
  <div class="dot"></div>
  <h1>South Traders — Sophia</h1>
  <span class="ts" id="ts">Cargando...</span>
</header>
<div class="wrap">
  <div class="stats">
    <div class="stat"><div class="n" id="nContacts">0</div><div class="l">Contactos</div></div>
    <div class="stat"><div class="n" id="nMsgs">0</div><div class="l">Mensajes</div></div>
    <div class="stat"><div class="n" id="nPaused">0</div><div class="l">Pausados</div></div>
  </div>
  <div class="sendbox">
    <h2>✉️ Enviar mensaje directo</h2>
    <div class="row">
      <input id="sPhone" placeholder="Número ej: 5491112345678">
      <input id="sMsg" placeholder="Mensaje..." style="flex:3">
      <button class="btn btn-blue" onclick="sendDirect()">Enviar</button>
    </div>
  </div>
  <div id="list" class="contacts"><div class="empty">Cargando...</div></div>
</div>
<div class="toast" id="toast"></div>
<script>
let crm={};
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function fmt(ts){if(!ts)return'';const d=new Date(ts);return d.toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>')}

async function load(){
  try{
    const [cr,cv]=await Promise.all([fetch('/crm/contacts').then(r=>r.json()),fetch('/conversations').then(r=>r.json())]);
    crm={};
    (cr.contacts||[]).forEach(c=>crm[c.phone]=c);
    const convs=cv.conversations||{};
    const phones=Object.keys(convs);
    let tm=0,tp=0;
    phones.forEach(p=>{tm+=(convs[p].messages||[]).length;if(crm[p]&&crm[p].paused)tp++});
    document.getElementById('nContacts').textContent=phones.length;
    document.getElementById('nMsgs').textContent=tm;
    document.getElementById('nPaused').textContent=tp;
    document.getElementById('ts').textContent='Actualizado: '+new Date().toLocaleTimeString('es-AR');
    phones.sort((a,b)=>{
      const ma=convs[a].messages||[],mb=convs[b].messages||[];
      const ta=ma.length?new Date(ma[ma.length-1].ts):0,tb=mb.length?new Date(mb[mb.length-1].ts):0;
      return tb-ta;
    });
    const list=document.getElementById('list');
    if(!phones.length){list.innerHTML='<div class="empty">Sin conversaciones aún.</div>';return}
    list.innerHTML=phones.map(p=>{
      const msgs=convs[p].messages||[];
      const last=msgs.length?msgs[msgs.length-1]:null;
      const c=crm[p]||{};
      const paused=c.paused;
      const msgsHtml=msgs.map(m=>`<div class="mwrap ${m.role}"><div class="msg ${m.role}">${esc(m.content)}</div><div class="mtime">${fmt(m.ts)}</div></div>`).join('');
      return `<div class="card" id="card-${p}">
        <div class="card-head" onclick="toggle('${p}')">
          <div class="avatar">${p.slice(-2)}</div>
          <div class="info">
            <div class="phone">+${p}${c.country?' · '+c.country:''}</div>
            <div class="meta">${msgs.length} mensajes${last?' · '+fmt(last.ts):''}</div>
          </div>
          <div class="actions" onclick="event.stopPropagation()">
            <span class="badge ${paused?'badge-off':'badge-on'}" id="badge-${p}">${paused?'⏸ Pausado':'🟢 Activo'}</span>
            <button class="${paused?'btn btn-green':'btn btn-orange'}" id="pbtn-${p}" onclick="togglePause('${p}',${paused})">${paused?'▶ Reanudar':'⏸ Pausar'}</button>
            <button class="btn btn-red" onclick="clearH('${p}')">🗑 Borrar</button>
          </div>
          <div class="chev" id="chev-${p}">▼</div>
        </div>
        <div class="msgs" id="msgs-${p}">${msgsHtml}</div>
        <div class="reply" id="reply-${p}">
          <input id="ri-${p}" placeholder="Escribir como Sophia..." onkeydown="if(event.key==='Enter')reply('${p}')">
          <button class="btn btn-blue" onclick="reply('${p}')">Enviar</button>
        </div>
      </div>`;
    }).join('');
  }catch(e){document.getElementById('list').innerHTML='<div class="empty">Error al cargar: '+e.message+'</div>'}
}

function toggle(p){
  const m=document.getElementById('msgs-'+p);
  const c=document.getElementById('chev-'+p);
  const r=document.getElementById('reply-'+p);
  const open=m.classList.toggle('open');
  c.classList.toggle('open',open);
  r.classList.toggle('open',open);
  if(open)m.scrollTop=m.scrollHeight;
}

async function togglePause(p,paused){
  const np=!paused;
  await fetch('/crm/pause',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:p,paused:np})});
  document.getElementById('badge-'+p).textContent=np?'⏸ Pausado':'🟢 Activo';
  document.getElementById('badge-'+p).className='badge '+(np?'badge-off':'badge-on');
  document.getElementById('pbtn-'+p).textContent=np?'▶ Reanudar':'⏸ Pausar';
  document.getElementById('pbtn-'+p).className=np?'btn btn-green':'btn btn-orange';
  if(crm[p])crm[p].paused=np;
  toast(np?'⏸ Pausado +'+p:'▶ Reactivado +'+p);
}

async function clearH(p){
  if(!confirm('¿Borrar historial de +'+p+'?'))return;
  await fetch('/conversations/clear',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:p})});
  toast('✅ Historial borrado');
  load();
}

async function reply(p){
  const inp=document.getElementById('ri-'+p);
  const msg=inp.value.trim();
  if(!msg)return;
  inp.value='';
  await fetch('/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:p,message:msg})});
  toast('✅ Enviado a +'+p);
  setTimeout(load,1000);
}

async function sendDirect(){
  const p=document.getElementById('sPhone').value.trim().replace(/\D/g,'');
  const m=document.getElementById('sMsg').value.trim();
  if(!p||!m){toast('Completá número y mensaje');return}
  await fetch('/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:p,message:m})});
  document.getElementById('sPhone').value='';
  document.getElementById('sMsg').value='';
  toast('✅ Enviado a +'+p);
  setTimeout(load,1000);
}

load();
setInterval(load,30000);
</script>
</body>
</html>
