<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sophia Dashboard - South Traders</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#f5f5f5;padding:16px;color:#111}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
h1{font-size:18px;font-weight:600}
.badge{font-size:11px;padding:3px 8px;border-radius:10px;background:#d1fae5;color:#065f46;font-weight:500}
.badge.off{background:#fee2e2;color:#991b1b}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat{background:#fff;border-radius:10px;padding:12px;border:1px solid #e5e5e5}
.stat-lbl{font-size:11px;color:#888;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:600}
.layout{display:grid;grid-template-columns:220px 1fr;gap:10px}
@media(max-width:600px){.layout{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}}
.sidebar{background:#fff;border-radius:10px;border:1px solid #e5e5e5;overflow-y:auto;max-height:520px}
.sh{padding:8px 12px;font-size:11px;color:#888;border-bottom:1px solid #eee;text-transform:uppercase;letter-spacing:.05em;background:#fafafa}
.contact{padding:10px 12px;cursor:pointer;border-bottom:1px solid #f0f0f0}
.contact:hover{background:#f5f5f5}
.contact.active{background:#e8f0fe}
.cp{font-size:13px;font-weight:600;margin-bottom:2px}
.cv{font-size:11px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ct{font-size:10px;color:#bbb;margin-top:2px}
.chat{background:#fff;border-radius:10px;border:1px solid #e5e5e5;display:flex;flex-direction:column}
.cht{padding:10px 14px;border-bottom:1px solid #eee;font-size:13px;font-weight:600;background:#fafafa;border-radius:10px 10px 0 0;display:flex;justify-content:space-between;align-items:center}
.cb{overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;min-height:350px;max-height:460px}
.mw{display:flex;flex-direction:column}
.mw.user{align-items:flex-end}
.mw.assistant{align-items:flex-start}
.m{max-width:80%;padding:8px 12px;border-radius:12px;font-size:13px;line-height:1.5;word-break:break-word;white-space:pre-wrap}
.m.user{background:#e8f0fe;color:#1a56c4;border-bottom-right-radius:3px}
.m.assistant{background:#f0f0f0;color:#111;border-bottom-left-radius:3px}
.mt{font-size:10px;color:#bbb;margin-top:2px}
.empty{display:flex;align-items:center;justify-content:center;height:200px;color:#bbb;font-size:13px}
.btn{font-size:12px;padding:5px 12px;border:1px solid #ddd;border-radius:6px;cursor:pointer;background:#fff}
.clr{font-size:11px;padding:3px 8px;border:1px solid #fca5a5;border-radius:5px;cursor:pointer;background:#fff;color:#dc2626}
</style>
</head>
<body>
<div class="hdr">
  <h1>Sophia - South Traders</h1>
  <div style="display:flex;gap:8px;align-items:center">
    <span id="badge" class="badge off">conectando...</span>
    <button class="btn" onclick="load()">Actualizar</button>
  </div>
</div>
<div class="stats">
  <div class="stat"><div class="stat-lbl">Conversaciones</div><div class="stat-val" id="st">-</div></div>
  <div class="stat"><div class="stat-lbl">Mensajes totales</div><div class="stat-val" id="sm">-</div></div>
  <div class="stat"><div class="stat-lbl">Actualizado</div><div class="stat-val" style="font-size:13px;padding-top:5px" id="su">-</div></div>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="sh">Contactos</div>
    <div id="contacts"></div>
  </div>
  <div class="chat">
    <div class="cht">
      <span id="ct">Selecciona un contacto</span>
      <button class="clr" id="clrbtn" style="display:none" onclick="clrHist()">Borrar historial</button>
    </div>
    <div class="cb" id="cb"><div class="empty">Elige un contacto</div></div>
  </div>
</div>
<script>
const BOT = 'https://southtraders-whatsapp-bot.onrender.com';
let convs = {}, sel = null;

function fmt(p) {
  if (p.startsWith('549')) return '+54 9 ' + p.slice(3,5) + ' ' + p.slice(5,9) + '-' + p.slice(9);
  if (p.startsWith('1') && p.length === 11) return '+1 (' + p.slice(1,4) + ') ' + p.slice(4,7) + '-' + p.slice(7);
  return '+' + p;
}
function ft(ts) {
  if (!ts) return '';
  try { return new Date(ts).toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'}); } catch(e) { return ''; }
}
function fd(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts);
    return d.toLocaleDateString('es-AR', {day:'2-digit',month:'2-digit'}) + ' ' + d.toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'});
  } catch(e) { return ''; }
}

function rc() {
  const phones = Object.keys(convs).sort(function(a,b) {
    const al = convs[a].messages && convs[a].messages.length ? convs[a].messages[convs[a].messages.length-1].ts : '';
    const bl = convs[b].messages && convs[b].messages.length ? convs[b].messages[convs[b].messages.length-1].ts : '';
    return bl.localeCompare(al);
  });
  const el = document.getElementById('contacts');
  if (!phones.length) { el.innerHTML = '<div class="empty" style="height:80px;font-size:12px">Sin conversaciones</div>'; return; }
  el.innerHTML = phones.map(function(p) {
    const msgs = convs[p].messages || [];
    const last = msgs[msgs.length-1];
    const preview = last ? last.content.substring(0,40) + '...' : '';
    const active = p === sel ? ' active' : '';
    return '<div class="contact' + active + '" onclick="sc('' + p + '')">' +
      '<div class="cp">' + fmt(p) + '</div>' +
      '<div class="cv">' + preview + '</div>' +
      '<div class="ct">' + msgs.length + ' msgs - ' + (last ? fd(last.ts) : '') + '</div>' +
      '</div>';
  }).join('');
}

function sc(phone) {
  sel = phone;
  rc();
  const msgs = (convs[phone] && convs[phone].messages) || [];
  document.getElementById('ct').textContent = fmt(phone) + ' - ' + msgs.length + ' mensajes';
  document.getElementById('clrbtn').style.display = 'block';
  const cb = document.getElementById('cb');
  if (!msgs.length) { cb.innerHTML = '<div class="empty">Sin mensajes</div>'; return; }
  cb.innerHTML = msgs.map(function(m) {
    return '<div class="mw ' + m.role + '">' +
      '<div class="m ' + m.role + '">' + m.content.replace(/</g, '&lt;') + '</div>' +
      '<div class="mt">' + (m.role === 'assistant' ? 'Sophia - ' : '') + ft(m.ts) + '</div>' +
      '</div>';
  }).join('');
  cb.scrollTop = cb.scrollHeight;
}

async function clrHist() {
  if (!sel) return;
  if (!confirm('Borrar historial de ' + fmt(sel) + '?')) return;
  try {
    await fetch(BOT + '/conversations/clear', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({phone: sel})
    });
    await load();
    document.getElementById('cb').innerHTML = '<div class="empty">Historial borrado</div>';
  } catch(e) { alert('Error al borrar'); }
}

async function load() {
  const badge = document.getElementById('badge');
  try {
    const r = await fetch(BOT + '/conversations');
    const data = await r.json();
    convs = data.conversations || {};
    const phones = Object.keys(convs);
    const total = phones.reduce(function(s,p) { return s + (convs[p].messages||[]).length; }, 0);
    document.getElementById('st').textContent = phones.length;
    document.getElementById('sm').textContent = total;
    document.getElementById('su').textContent = new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    badge.textContent = 'en vivo';
    badge.className = 'badge';
    rc();
    if (sel && convs[sel]) sc(sel);
    else if (phones.length && !sel) sc(phones[0]);
  } catch(e) {
    badge.textContent = 'sin conexion';
    badge.className = 'badge off';
  }
}

load();
setInterval(load, 10000);
</script>
</body>
</html>
